<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stock Management — Khalid & Sons Petroleum</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="assets/styles.css" rel="stylesheet"/>
</head>
<body>
<div id="navbar-placeholder"></div>
<div class="container-fluid main-wrapper">
<div class="container">

  <div class="welcome-card">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
      <div>
        <h4 class="mb-1"><i class="bi bi-boxes me-2"></i>Fuel Stock</h4>
        <p class="mb-0 opacity-75">Track fuel dipping and stock entries</p>
      </div>
      <button class="btn btn-light fw-bold" data-bs-toggle="modal" data-bs-target="#addStockModal">
        <i class="bi bi-plus-circle me-1"></i>Add Stock Entry
      </button>
    </div>
  </div>

  <!-- Current Stock Summary -->
  <div class="row g-3 mb-4">
    <div class="col-md-4">
      <div class="card h-100">
        <div class="card-body text-center">
          <div class="fw-bold text-muted mb-1">Petrol Stock</div>
          <div class="fw-bold fs-2 text-primary" id="petrol-stock">0 L</div>
          <small class="text-muted">Current tank level</small>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card h-100">
        <div class="card-body text-center">
          <div class="fw-bold text-muted mb-1">Diesel Stock</div>
          <div class="fw-bold fs-2 text-warning" id="diesel-stock">0 L</div>
          <small class="text-muted">Current tank level</small>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card h-100">
        <div class="card-body text-center">
          <div class="fw-bold text-muted mb-1">Last Updated</div>
          <div class="fw-bold fs-5" id="stock-updated">—</div>
          <small class="text-muted">Latest dipping</small>
        </div>
      </div>
    </div>
  </div>

  <!-- Stock History Table -->
  <div class="card">
    <div class="card-header fw-bold"><i class="bi bi-list me-2"></i>Stock History</div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr><th>Date</th><th>Fuel Type</th><th>Dipping (L)</th><th>Received (L)</th><th>Notes</th><th>Actions</th></tr>
          </thead>
          <tbody id="stock-tbody">
            <tr><td colspan="6" class="text-center py-4">
              <div class="spinner-border spinner-border-sm me-2"></div>Loading...
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>
</div>
<div id="footer-placeholder"></div>

<!-- Add Stock Modal -->
<div class="modal fade" id="addStockModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-bold"><i class="bi bi-plus me-2"></i>Add Stock Entry</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3">
          <div class="col-6">
            <label class="form-label fw-bold">Date</label>
            <input type="date" id="st-date" class="form-control"/>
          </div>
          <div class="col-6">
            <label class="form-label fw-bold">Fuel Type</label>
            <select id="st-fuel" class="form-select">
              <option value="Petrol">Petrol</option>
              <option value="Diesel">Diesel</option>
            </select>
          </div>
          <div class="col-6">
            <label class="form-label fw-bold">Dipping / Current Level (L)</label>
            <input type="number" id="st-dipping" class="form-control" placeholder="0" step="0.01"/>
          </div>
          <div class="col-6">
            <label class="form-label fw-bold">Received Stock (L)</label>
            <input type="number" id="st-received" class="form-control" placeholder="0" step="0.01"/>
          </div>
          <div class="col-12">
            <label class="form-label fw-bold">Notes</label>
            <input type="text" id="st-notes" class="form-control" placeholder="Optional notes"/>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="saveStock()">
          <i class="bi bi-cloud-upload me-1"></i>Save
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/stock.js"></script>
<script>
  async function init() {
    await requireAuth();
    document.getElementById('st-date').value = new Date().toISOString().split('T')[0];
    loadStock();
  }
  init();
</script>
</body>
</html>
