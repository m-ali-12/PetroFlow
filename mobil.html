<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mobil Oil — Khalid & Sons Petroleum</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="assets/styles.css" rel="stylesheet"/>
</head>
<body>
<div id="navbar-placeholder"></div>
<div class="container-fluid main-wrapper">
<div class="container">

  <div class="welcome-card">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
      <div>
        <h4 class="mb-1"><i class="bi bi-droplet me-2"></i>Mobil Oil Stock</h4>
        <p class="mb-0 opacity-75">Track mobil oil inventory and sales</p>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-light fw-bold" data-bs-toggle="modal" data-bs-target="#addMobilModal">
          <i class="bi bi-plus me-1"></i>Add Stock
        </button>
        <button class="btn btn-outline-light" data-bs-toggle="modal" data-bs-target="#sellMobilModal">
          <i class="bi bi-cart me-1"></i>Record Sale
        </button>
      </div>
    </div>
  </div>

  <!-- Stock Cards -->
  <div class="row g-3 mb-4" id="mobil-stock-cards">
    <div class="col-12 text-center py-4">
      <div class="spinner-border spinner-border-sm me-2"></div>Loading stock...
    </div>
  </div>

  <!-- Sales History -->
  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span class="fw-bold"><i class="bi bi-list me-2"></i>Sales / Stock History</span>
      <div>
        <select id="mobil-filter" class="form-select form-select-sm d-inline-block" style="width:130px;" onchange="loadMobilHistory()">
          <option value="all">All</option>
          <option value="sale">Sales Only</option>
          <option value="stock">Stock In</option>
        </select>
      </div>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr><th>Date</th><th>Item</th><th>Type</th><th>Qty</th><th>Price</th><th>Amount</th><th>Notes</th><th>Actions</th></tr>
          </thead>
          <tbody id="mobil-tbody">
            <tr><td colspan="8" class="text-center py-4 text-muted">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>
</div>
<div id="footer-placeholder"></div>

<!-- Add Stock Modal -->
<div class="modal fade" id="addMobilModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-bold">Add Mobil Oil Stock</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3">
          <div class="col-12"><label class="form-label fw-bold">Item / Grade</label>
            <input type="text" id="ms-item" class="form-control" placeholder="e.g. Mobil 20W-50, 1L"/></div>
          <div class="col-6"><label class="form-label fw-bold">Quantity</label>
            <input type="number" id="ms-qty" class="form-control" placeholder="0"/></div>
          <div class="col-6"><label class="form-label fw-bold">Cost Price (Rs.)</label>
            <input type="number" id="ms-cost" class="form-control" placeholder="0"/></div>
          <div class="col-6"><label class="form-label fw-bold">Selling Price (Rs.)</label>
            <input type="number" id="ms-sell" class="form-control" placeholder="0"/></div>
          <div class="col-6"><label class="form-label fw-bold">Date</label>
            <input type="date" id="ms-date" class="form-control"/></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="addMobilStock()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Sell Modal -->
<div class="modal fade" id="sellMobilModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-bold">Record Mobil Sale</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3">
          <div class="col-12"><label class="form-label fw-bold">Item / Grade</label>
            <select id="sell-item" class="form-select" id="sell-item"></select></div>
          <div class="col-6"><label class="form-label fw-bold">Qty Sold</label>
            <input type="number" id="sell-qty" class="form-control" placeholder="0"/></div>
          <div class="col-6"><label class="form-label fw-bold">Selling Price (Rs.)</label>
            <input type="number" id="sell-price" class="form-control" placeholder="0"/></div>
          <div class="col-6"><label class="form-label fw-bold">Date</label>
            <input type="date" id="sell-date" class="form-control"/></div>
          <div class="col-12"><label class="form-label fw-bold">Notes</label>
            <input type="text" id="sell-notes" class="form-control" placeholder="Optional"/></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-success" onclick="recordMobilSale()">Record Sale</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/mobil-stock.js"></script>
<script>
  async function init() {
    await requireAuth();
    const today = new Date().toISOString().split('T')[0];
    ['ms-date','sell-date'].forEach(id => { const e = document.getElementById(id); if(e) e.value = today; });
    loadMobilStock();
    loadMobilHistory();
  }
  init();
</script>
</body>
</html>
