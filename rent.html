<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rent Management — Khalid & Sons Petroleum</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="assets/styles.css" rel="stylesheet"/>
</head>
<body>
<div id="navbar-placeholder"></div>
<div class="container-fluid main-wrapper">
<div class="container">

  <div class="welcome-card">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
      <div>
        <h4 class="mb-1"><i class="bi bi-shop me-2"></i>Rent Management</h4>
        <p class="mb-0 opacity-75">Shop / property rent tracking</p>
      </div>
      <button class="btn btn-light fw-bold" data-bs-toggle="modal" data-bs-target="#addRentModal">
        <i class="bi bi-plus me-1"></i>Add Tenant / Record
      </button>
    </div>
  </div>

  <!-- Summary -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="s-card">
        <div class="s-label">Total Tenants</div>
        <div class="s-value text-primary" id="rent-tenants">0</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="s-card">
        <div class="s-label">Monthly Rent Due</div>
        <div class="s-value text-warning" id="rent-due">Rs. 0</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="s-card">
        <div class="s-label">Collected This Month</div>
        <div class="s-value text-success" id="rent-collected">Rs. 0</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="s-card">
        <div class="s-label">Pending</div>
        <div class="s-value text-danger" id="rent-pending">Rs. 0</div>
      </div>
    </div>
  </div>

  <!-- Rent Records Table -->
  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span class="fw-bold"><i class="bi bi-list me-2"></i>Rent Records</span>
      <div>
        <input type="month" id="rent-month" class="form-control form-control-sm d-inline-block" style="width:140px;"
               onchange="loadRent()"/>
      </div>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr><th>Tenant / Shop</th><th>Monthly Rent</th><th>Paid Amount</th><th>Date Paid</th><th>Status</th><th>Actions</th></tr>
          </thead>
          <tbody id="rent-tbody">
            <tr><td colspan="6" class="text-center py-4 text-muted">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>
</div>
<div id="footer-placeholder"></div>

<!-- Add Rent Modal -->
<div class="modal fade" id="addRentModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-bold">Add / Record Rent</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3">
          <div class="col-12"><label class="form-label fw-bold">Tenant / Shop Name</label>
            <input type="text" id="r-tenant" class="form-control" placeholder="Tenant name or shop no."/></div>
          <div class="col-6"><label class="form-label fw-bold">Monthly Rent (Rs.)</label>
            <input type="number" id="r-rent" class="form-control" placeholder="0"/></div>
          <div class="col-6"><label class="form-label fw-bold">Paid Amount (Rs.)</label>
            <input type="number" id="r-paid" class="form-control" placeholder="0"/></div>
          <div class="col-6"><label class="form-label fw-bold">Date Paid</label>
            <input type="date" id="r-date" class="form-control"/></div>
          <div class="col-6"><label class="form-label fw-bold">Month (for)</label>
            <input type="month" id="r-month" class="form-control"/></div>
          <div class="col-12"><label class="form-label fw-bold">Notes</label>
            <input type="text" id="r-notes" class="form-control" placeholder="Optional"/></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="saveRent()">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/rent-management.js"></script>
<script>
  async function init() {
    await requireAuth();
    const today = new Date().toISOString().split('T')[0];
    const ym = today.slice(0,7);
    document.getElementById('r-date').value = today;
    document.getElementById('r-month').value = ym;
    document.getElementById('rent-month').value = ym;
    loadRent();
  }
  init();
</script>
</body>
</html>
