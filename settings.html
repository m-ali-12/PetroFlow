<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Settings — Khalid & Sons Petroleum</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="assets/styles.css" rel="stylesheet"/>
</head>
<body>
<div id="navbar-placeholder"></div>
<div class="container-fluid main-wrapper">
<div class="container" style="max-width:700px;">

  <div class="welcome-card">
    <h4 class="mb-1"><i class="bi bi-gear-fill me-2"></i>Settings</h4>
    <p class="mb-0 opacity-75">Fuel prices, pump name, account info</p>
  </div>

  <!-- Fuel Prices -->
  <div class="card mb-4">
    <div class="card-header bg-primary text-white fw-bold">
      <i class="bi bi-droplet-fill me-2"></i>Fuel Prices
    </div>
    <div class="card-body">
      <div class="row g-3">
        <div class="col-6">
          <label class="form-label fw-bold">Petrol Price (Rs./Liter)</label>
          <input type="number" id="petrol-price" class="form-control form-control-lg" placeholder="0"/>
        </div>
        <div class="col-6">
          <label class="form-label fw-bold">Diesel Price (Rs./Liter)</label>
          <input type="number" id="diesel-price" class="form-control form-control-lg" placeholder="0"/>
        </div>
        <div class="col-12">
          <button class="btn btn-primary" onclick="savePrices()">
            <i class="bi bi-cloud-upload me-1"></i>Update Prices
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Price History -->
  <div class="card mb-4">
    <div class="card-header fw-bold"><i class="bi bi-clock-history me-2"></i>Price History</div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr><th>Date</th><th>Petrol</th><th>Diesel</th></tr>
          </thead>
          <tbody id="price-history-tbody">
            <tr><td colspan="3" class="text-center py-3 text-muted">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Pump Info -->
  <div class="card mb-4">
    <div class="card-header fw-bold"><i class="bi bi-building me-2"></i>Pump Information</div>
    <div class="card-body">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label fw-bold">Pump Name</label>
          <input type="text" id="pump-name" class="form-control" placeholder="e.g. Khalid & Sons Petroleum"/>
        </div>
        <div class="col-6">
          <label class="form-label fw-bold">Owner Name</label>
          <input type="text" id="owner-name" class="form-control" placeholder="Owner name"/>
        </div>
        <div class="col-6">
          <label class="form-label fw-bold">Phone</label>
          <input type="text" id="pump-phone" class="form-control" placeholder="03xx-xxxxxxx"/>
        </div>
        <div class="col-12">
          <label class="form-label fw-bold">Address</label>
          <input type="text" id="pump-address" class="form-control" placeholder="Pump address"/>
        </div>
        <div class="col-12">
          <button class="btn btn-success" onclick="savePumpInfo()">
            <i class="bi bi-check-circle me-1"></i>Save Info
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Change Password -->
  <div class="card mb-4">
    <div class="card-header fw-bold"><i class="bi bi-lock-fill me-2"></i>Change Password</div>
    <div class="card-body">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label fw-bold">New Password</label>
          <input type="password" id="new-password" class="form-control" placeholder="New password"/>
        </div>
        <div class="col-12">
          <label class="form-label fw-bold">Confirm Password</label>
          <input type="password" id="confirm-password" class="form-control" placeholder="Confirm password"/>
        </div>
        <div class="col-12">
          <button class="btn btn-warning" onclick="changePassword()">
            <i class="bi bi-key me-1"></i>Change Password
          </button>
        </div>
      </div>
    </div>
  </div>

</div>
</div>
<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/settings-page.js"></script>
<script>
  async function init() { await requireAuth(); loadSettings(); }
  init();
</script>
</body>
</html>
